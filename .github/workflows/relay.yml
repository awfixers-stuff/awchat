name: relay

on:
  push:
    paths:
      - "server/relay/**"
      - ".github/workflows/relay.yml"
  pull_request:
    paths:
      - "server/relay/**"
      - ".github/workflows/relay.yml"

defaults:
  run:
    working-directory: server/relay

jobs:
  test:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awchat -d awchat_relay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: dtolnay/rust-toolchain@stable

      - uses: gleam-lang/setup-gleam@v1.0.2
        with:
          gleam-version: "1.16.0"

      - name: Gleam tests
        run: cd packages/core && gleam test

      - name: Mix deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Unit tests
        run: mix test --no-start

      - name: Migrate test database
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_relay_test
        run: mix ecto.create && mix ecto.migrate
