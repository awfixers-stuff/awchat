name: auth

on:
  push:
    paths:
      - "server/auth/**"
      - ".github/workflows/auth.yml"
  pull_request:
    paths:
      - "server/auth/**"
      - ".github/workflows/auth.yml"

defaults:
  run:
    working-directory: server/auth

jobs:
  test:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awchat -d awchat_auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: dtolnay/rust-toolchain@stable

      - name: Mix deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Unit tests
        run: mix test --no-start --exclude integration

      - name: Migrate test database
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        run: mix ecto.create && mix ecto.migrate

      - name: Integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        run: mix test --only integration
