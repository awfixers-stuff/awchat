name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  compile-debug:
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: ./gradlew assembleDebug testDebugUnitTest --no-daemon
