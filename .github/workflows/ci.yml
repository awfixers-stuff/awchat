name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  repo-static:
    name: repo / static
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run fmt

  android-compile:
    name: android / compile
    runs-on: blacksmith-8vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

  android-static:
    name: android / static
    runs-on: blacksmith-8vcpu-ubuntu-2404
    needs: android-compile
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: ./gradlew detekt --no-daemon

  android-instrumented:
    name: android / instrumented
    runs-on: blacksmith-8vcpu-ubuntu-2404
    needs: android-compile
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --no-daemon

  auth:
    name: server / auth
    runs-on: blacksmith-8vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: server/auth
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awchat -d awchat_auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - uses: dtolnay/rust-toolchain@stable
      - run: mix deps.get
      - run: mix compile
      - run: mix test --no-start --exclude integration
      - name: Migrate test database
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        run: mix ecto.create && mix ecto.migrate
      - name: Integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_auth_test
        run: mix test --only integration
      - name: Docker build
        run: docker build -t awchat-auth:ci .

  broker:
    name: server / broker
    runs-on: blacksmith-8vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: server/broker
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - run: mix deps.get
      - run: mix compile
      - run: mix test
      - name: Docker build
        run: docker build -t awchat-broker:ci .

  relay:
    name: server / relay
    runs-on: blacksmith-8vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: server/relay
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awchat -d awchat_relay_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - uses: dtolnay/rust-toolchain@stable
      - uses: gleam-lang/setup-gleam@v1.0.2
        with:
          gleam-version: "1.16.0"
      - run: cd packages/core && gleam test
      - run: mix deps.get
      - run: mix compile
      - run: mix test --no-start
      - name: Migrate test database
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: awchat
          POSTGRES_PASSWORD: awchat
          POSTGRES_DB: awchat_relay_test
        run: mix ecto.create && mix ecto.migrate
      - name: Docker build
        run: docker build -t awchat-relay:ci .

  gate:
    name: gate
    runs-on: blacksmith-8vcpu-ubuntu-2404
    needs:
      - repo-static
      - android-compile
      - android-static
      - android-instrumented
      - auth
      - broker
      - relay
    steps:
      - run: echo "All CI checks passed."