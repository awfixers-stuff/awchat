services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: awchat
      POSTGRES_PASSWORD: awchat
      POSTGRES_DB: awchat_relay_dev
    ports:
      - "5432:5432"
    volumes:
      - relay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awchat -d awchat_relay_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  relay:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MIX_ENV: prod
      DATABASE_URL: postgres://awchat:awchat@postgres:5432/awchat_relay_dev
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  relay_pg_data:
